<!DOCTYPE html>

content="width=device-width, initial-scale=1,
maximum-scale=1,
user-scalable=no,

<title>AETHER OS v3.5</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

<style>

/* =================================================
ROOT VARIABLES
================================================= */

:root{

--bg:#0e0e12;
--bg-soft:#141820;

--glass:rgba(255,255,255,.06);
--glass-strong:rgba(255,255,255,.12);

--accent:#00ff9d;
--accent-soft:rgba(0,255,157,.25);

--text:#ffffff;
--radius:22px;

--transition:.35s cubic-bezier(.22,1,.36,1);

/* animated transitions */

transition:
--accent .35s ease,
--accent-soft .35s ease,
background .35s ease;

}

/* =================================================
RESET
================================================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
background:var(--bg);
color:var(--text);
font-family:system-ui,-apple-system,BlinkMacSystemFont;
overflow:hidden;
}

/* =================================================
AMBIENT BACKGROUND
================================================= */

body::before{
content:"";
position:fixed;
inset:0;

background:
radial-gradient(
circle at 70% 30%,
var(--accent-soft),
transparent 60%
);

z-index:-1;
pointer-events:none;

animation:ambientMove 16s infinite alternate ease-in-out;
}

@keyframes ambientMove{
0%{transform:translateX(0) translateY(0)}
100%{transform:translateX(-80px) translateY(60px)}
}

/* =================================================
GLASS SYSTEM
================================================= */

.glass{
background:var(--glass);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,.08);
}

.glass-strong{
background:var(--glass-strong);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.15);
}

.glass-card{
box-shadow:0 25px 60px rgba(0,0,0,.6);
transition:transform .25s ease;
}

.glass-card:active{
transform:scale(.96);
}

/* =================================================
LAYOUT
================================================= */

#app{
display:flex;
height:100vh;
}

/* =================================================
SIDEBAR
================================================= */

.sidebar{
width:80px;
display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;
padding:20px 0;
}

.dots{
width:60px;
height:60px;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
cursor:pointer;
}

.rank{
width:60px;
height:60px;

border-radius:50%;
border:4px solid var(--accent);

display:flex;
align-items:center;
justify-content:center;

font-weight:bold;
transition:var(--transition);
}

#xpBar{
width:60px;
height:6px;

background:rgba(255,255,255,.1);
border-radius:4px;
overflow:hidden;
margin-top:8px;
}

#xpFill{
height:100%;
width:0%;
background:var(--accent);
transition:.4s;
}

/* =================================================
MAIN AREA
================================================= */

.main{
flex:1;
overflow-y:auto;
padding:24px;
}

.container{
max-width:1200px;
margin:auto;
}

/* =================================================
GRID
================================================= */

.grid{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(160px,1fr));

gap:18px;
margin-top:20px;
}

/* =================================================
ANALYZE BUTTON
================================================= */

#analyzeBtn{

position:fixed;
top:20px;
right:20px;

width:64px;
height:64px;

border-radius:50%;

display:none;
align-items:center;
justify-content:center;

background:
linear-gradient(
145deg,
var(--accent),
#00d47f
);

color:#000;
font-size:22px;

box-shadow:0 8px 30px var(--accent-soft);

animation:pulse 2.4s infinite;
z-index:999;
}

@keyframes pulse{

0%{
box-shadow:0 8px 30px var(--accent-soft)
}

50%{
box-shadow:0 12px 45px var(--accent-soft)
}

100%{
box-shadow:0 8px 30px var(--accent-soft)
}

}

/* =================================================
HUD
================================================= */

.hud{

position:fixed;
left:0;
right:0;
bottom:0;

height:80%;
padding:24px;

background:rgba(0,0,0,.95);
backdrop-filter:blur(20px);

border-top-left-radius:30px;
border-top-right-radius:30px;

transform:translateY(100%);
transition:transform .4s cubic-bezier(.22,1,.36,1);

overflow-y:auto;
z-index:1000;
}

.hud.active{
transform:translateY(0);
}

.hud button{

width:100%;
height:54px;

margin:10px 0;

border:none;
border-radius:18px;

background:rgba(255,255,255,.08);

color:#fff;
font-size:15px;

}

/* =================================================
DESKTOP MODE
================================================= */

@media (min-width:900px){

.sidebar{
width:110px;
}

.grid{
grid-template-columns:
repeat(auto-fill,minmax(200px,1fr));
}

.hud{

width:420px;
left:50%;

transform:translateX(-50%);

height:auto;
top:20%;
bottom:auto;

border-radius:30px;
}

}

</style>
</head>

</button>

DNA Analytics
</button>

Search Anime
</button>

<button onclick="viewRecommendations();closeHUD()">
AI Recommendations
</button>

Watch Dashboard
</button>

Achievements

<script>

/* =================================================
BASE STATE
================================================= */

let vaultData =
JSON.parse(localStorage.getItem("aether_v27")) || [];

let xp =
parseInt(localStorage.getItem("aether_xp")) || 0;

let streak =
parseInt(localStorage.getItem("aether_streak")) || 0;

let adaptiveMode =
JSON.parse(localStorage.getItem("aether_adaptive")) || false;

/* =================================================
HUD
================================================= */

function toggleHUD(){
document
.getElementById("hud")
.classList
.toggle("active");
}

function closeHUD(){
document
.getElementById("hud")
.classList
.remove("active");
}

/* =================================================
THEME ENGINE
================================================= */

const themes={

neon:{
bg:"#0e0e12",
accent:"#00ff9d"
},

midnight:{
bg:"#121826",
accent:"#00cfff"
},

crimson:{
bg:"#1a0c0c",
accent:"#ff3b3b"
},

ocean:{
bg:"#07151c",
accent:"#00e5ff"
},

light:{
bg:"#f4f4f4",
accent:"#007aff"
},

mono:{
bg:"#111111",
accent:"#ffffff"
}

};

let currentTheme=
localStorage.getItem("aether_theme") || "neon";

function applyTheme(name){

let t=themes[name];

document.documentElement
.style
.setProperty("--bg",t.bg);

document.documentElement
.style
.setProperty("--accent",t.accent);

document.documentElement
.style
.setProperty("--accent-soft",
t.accent+"40");

localStorage
.setItem("aether_theme",name);

currentTheme=name;

}

function toggleTheme(){

let names=Object.keys(themes);

let i=names.indexOf(currentTheme);

let next=names[(i+1)%names.length];

applyTheme(next);

}

/* apply saved theme */

applyTheme(currentTheme);

/* =================================================
ADAPTIVE MODE
================================================= */

function toggleAdaptiveMode(){

adaptiveMode=!adaptiveMode;

localStorage.setItem(
"aether_adaptive",
JSON.stringify(adaptiveMode)
);

alert(
"Genre Adaptive Mode: "
+(adaptiveMode?"ON":"OFF")
);

}

/* =================================================
XP + RANK
================================================= */

function updateRank(){

let ranks=["E","D","C","B","A","S"];

let level=
Math.min(
Math.floor(vaultData.length/5),
5
);

document
.getElementById("rankBadge")
.textContent=ranks[level];

}

function updateXP(){

let progress=xp%100;

document
.getElementById("xpFill")
.style.width=
progress+"%";

localStorage
.setItem("aether_xp",xp);

}

updateRank();
updateXP();

/* =================================================
PART 2 – NEURAL SCAN ENGINE
================================================= */

let cropper;
let croppedBlob=null;

const imageInput=document.getElementById("imageInput");
const analyzeBtn=document.getElementById("analyzeBtn");

/* ================= CROP MODAL ================= */

const cropModal=document.createElement("div");

cropModal.style.cssText=`
position:fixed;
inset:0;
background:#000;
display:none;
flex-direction:column;
z-index:2000;
`;

cropModal.innerHTML=`

<img id="cropImage"
style="flex:1;object-fit:contain;">

<div id="cropConfirm"
style="
height:70px;
background:var(--accent);
color:#000;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
">
CONFIRM CROP
</div>

`;

document.body.appendChild(cropModal);

const cropImage=document.getElementById("cropImage");
const cropConfirm=document.getElementById("cropConfirm");

/* ================= FILE INPUT ================= */

imageInput.addEventListener("change",handleFileInput);

function handleFileInput(e){

const file=e.target.files[0];

if(!file||!file.type.startsWith("image/")) return;

if(cropper){
cropper.destroy();
cropper=null;
}

const reader=new FileReader();

reader.onload=function(event){

cropImage.src=event.target.result;

cropModal.style.display="flex";

cropper=new Cropper(cropImage,{
viewMode:1,
autoCropArea:1,
responsive:true
});

};

reader.readAsDataURL(file);

}

/* ================= CROP CONFIRM ================= */

cropConfirm.onclick=function(){

cropper
.getCroppedCanvas()
.toBlob(blob=>{

croppedBlob=blob;

cropModal.style.display="none";

analyzeBtn.style.display="flex";

});

};

/* =================================================
CINEMATIC LOADER
================================================= */

const loader=document.createElement("div");

loader.style.cssText=`
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:3000;
color:#fff;
`;

loader.innerHTML=`

<div style="
width:60px;
height:60px;
border-radius:50%;
border:3px solid rgba(255,255,255,.1);
border-top:3px solid var(--accent);
animation:spin 1s linear infinite;
"></div>

<p id="loadingText"
style="margin-top:20px">
Extracting frame signature...
</p>

`;

document.body.appendChild(loader);

const loadingMessages=[

"Extracting frame signature...",
"Matching neural database...",
"Calculating confidence...",
"Building intelligence profile..."

];

let loadingInterval;

function startLoading(){

loader.style.display="flex";

let i=0;

loadingInterval=setInterval(()=>{

i=(i+1)%loadingMessages.length;

document
.getElementById("loadingText")
.textContent=loadingMessages[i];

},1500);

}

function stopLoading(){

loader.style.display="none";

clearInterval(loadingInterval);

}

/* =================================================
GENRE COLOR ENGINE
================================================= */

const genreColors={

Action:"#ff3b3b",
Romance:"#ff4fd8",
Comedy:"#ffc400",
SciFi:"#00e5ff",
Fantasy:"#8b5cf6",
Horror:"#8b0000",
Drama:"#00ff9d",
Mystery:"#5e17eb",
Adventure:"#00ff9d",
Default:"#00ff9d"

};

function applyGenreTheme(genres){

if(!adaptiveMode) return;

let color=genreColors[genres?.[0]]||genreColors.Default;

document.documentElement
.style.setProperty("--accent",color);

document.documentElement
.style.setProperty("--accent-soft",color+"40");

}

/* =================================================
DAILY STREAK SYSTEM
================================================= */

let lastScan=
localStorage.getItem("aether_lastScan");

function updateStreak(){

let today=new Date().toDateString();

if(lastScan!==today){

let yesterday=new Date();

yesterday.setDate(yesterday.getDate()-1);

if(lastScan===yesterday.toDateString()){

streak++;

}else{

streak=1;

}

localStorage.setItem("aether_streak",streak);

localStorage.setItem("aether_lastScan",today);

}

}

/* =================================================
ANALYZE PIPELINE
================================================= */

analyzeBtn.onclick=async function(){

if(!croppedBlob) return;

startLoading();

analyzeBtn.style.display="none";

try{

/* ---- trace.moe ---- */

let form=new FormData();
form.append("image",croppedBlob);

let res=await fetch(
"https://api.trace.moe/search",
{
method:"POST",
body:form
});

let data=await res.json();

let result=data.result[0];

/* ---- AniList metadata ---- */

let metaRes=await fetch(
"https://graphql.anilist.co",
{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
query:`query($id:Int){
Media(id:$id,type:ANIME){

title{romaji}

coverImage{large}

episodes

averageScore

popularity

genres

description

studios(isMain:true){
nodes{name}
}

characters(sort:FAVOURITES_DESC,perPage:6){
nodes{
name{full}
image{large}
}
}

recommendations(perPage:6){
nodes{
mediaRecommendation{
title{romaji}
coverImage{large}
}
}
}

}
}`,
variables:{id:result.anilist}
})
});

let meta=(await metaRes.json()).data.Media;

/* ---- OCR subtitles ---- */

let ocr=
await Tesseract.recognize(
croppedBlob,
"eng+jpn"
);

/* ---- create vault entry ---- */

let entry={

title:meta.title.romaji,

cover:meta.coverImage.large,

episodes:meta.episodes,

score:meta.averageScore,

popularity:meta.popularity,

genres:meta.genres,

description:meta.description,

studio:meta.studios.nodes[0]?.name||"Unknown",

characters:meta.characters.nodes,

recommendations:meta.recommendations.nodes,

episode:result.episode,

similarity:result.similarity,

video:result.video,

ocr:ocr.data.text,

scanDate:Date.now(),

progress:0

};

vaultData.push(entry);

localStorage.setItem(
"aether_v27",
JSON.stringify(vaultData)
);

/* apply adaptive theme */

applyGenreTheme(entry.genres);

/* XP */

xp+=20;

updateXP();
updateRank();

/* streak */

updateStreak();

/* render */

renderVault();

}catch(e){

alert("Scan failed");

}

stopLoading();

};

/* =================================================
VAULT RENDER + CONFIDENCE HEATMAP
================================================= */

function getConfidenceColor(sim){

if(sim>0.93) return "#00ff9d";

if(sim>0.85) return "#ffd000";

return "#ff3b3b";

}

function renderVault(){

const vault=document.getElementById("vault");

if(!vault) return;

vault.innerHTML="";

vaultData.forEach(v=>{

let card=document.createElement("div");

card.className="glass glass-card";

card.style.borderRadius="20px";

let color=getConfidenceColor(v.similarity||0);

card.style.border=`2px solid ${color}`;

card.innerHTML=`

<img loading="lazy"
src="${v.cover}"
style="
width:100%;
height:180px;
object-fit:cover;
border-radius:20px;
">

<div style="padding:12px">

<b>${v.title}</b>

</div>

`;

card.onclick=()=>openDetail(v);

vault.appendChild(card);

});

}

renderVault();

/* =================================================
PART 3 – SMART CLIP SCANNER
================================================= */

/* ================= CLIP SCANNER PAGE ================= */

function openClipScanner(){

document.getElementById("mainContent").innerHTML=`

<h2>Smart Clip Scanner</h2>

<p style="opacity:.6;margin-top:6px">
Upload a short anime clip. AETHER will extract the best frame
and identify the anime automatically.
</p>

<input type="file"
id="clipInput"
accept="video/*"
style="margin-top:20px">

<video id="clipPreview"
controls
style="
width:100%;
margin-top:20px;
border-radius:14px;
display:none;
"></video>

<button id="scanClipBtn"
style="
margin-top:20px;
width:100%;
height:54px;
border:none;
border-radius:16px;
background:var(--accent);
color:#000;
font-weight:bold;
display:none;
">
Analyze Clip
</button>

`;

const clipInput=document.getElementById("clipInput");
const preview=document.getElementById("clipPreview");
const scanBtn=document.getElementById("scanClipBtn");

clipInput.onchange=function(){

const file=this.files[0];

if(!file) return;

preview.src=URL.createObjectURL(file);

preview.style.display="block";

scanBtn.style.display="block";

};

scanBtn.onclick=()=>scanClip(preview);

}

/* =================================================
FRAME EXTRACTION ENGINE
================================================= */

async function scanClip(video){

startLoading();

try{

/* create canvas */

const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

/* set frame size */

canvas.width=320;
canvas.height=180;

/* choose time position */

video.currentTime=video.duration*0.35;

/* wait until seek finished */

await new Promise(resolve=>{
video.onseeked=resolve;
});

/* draw frame */

ctx.drawImage(video,0,0,canvas.width,canvas.height);

/* convert frame to blob */

const blob=await new Promise(resolve=>{
canvas.toBlob(resolve,"image/jpeg",0.9);
});

/* reuse the same recognition pipeline */

await analyzeFrame(blob);

}catch(e){

alert("Clip scanning failed.");

}

stopLoading();

}

/* =================================================
FRAME ANALYSIS PIPELINE
================================================= */

/* ---- trace.moe recognition ---- */

let data=await res.json();

let result=data.result[0];

/* ---- AniList metadata ---- */

let metaRes=await fetch(

{

headers:{'Content-Type':'application/json'},
body:JSON.stringify({

query:`query($id:Int){
Media(id:$id,type:ANIME){

title{romaji}

coverImage{large}

episodes

averageScore

popularity

genres

description

studios(isMain:true){

}

characters(perPage:6){

recommendations(perPage:6){

/* ---- create vault entry ---- */

vaultData.push(entry);

JSON.stringify(vaultData)

/* adaptive theme */

/* =================================================
VIDEO FRAME IMPROVEMENT (SMART FRAME SELECTION)
================================================= */

async function findBestFrame(video){

const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

canvas.width=320;
canvas.height=180;

let bestFrame=null;
let bestScore=0;

/* test multiple timestamps */

for(let i=0;i<5;i++){

video.currentTime=(video.duration/5)*i;

await new Promise(r=>video.onseeked=r);

ctx.drawImage(video,0,0,canvas.width,canvas.height);

let imageData=ctx.getImageData(0,0,canvas.width,canvas.height);

let brightness=0;

for(let j=0;j<imageData.data.length;j+=4){
brightness+=imageData.data[j];
}

if(brightness>bestScore){

bestScore=brightness;

bestFrame=canvas.toDataURL("image/jpeg",0.9);

}

}

/* convert to blob */

return fetch(bestFrame).then(r=>r.blob());

}

/* =================================================
PART 4 – NEURAL INTELLIGENCE ENGINE
================================================= */


/* =================================================
NEURAL PERSONALITY PROFILE
================================================= */

function calculatePersonality(){

let genres={};

vaultData.forEach(v=>{
v.genres.forEach(g=>{
genres[g]=(genres[g]||0)+1;
});
});

/* determine dominant genre */

let sorted=Object.entries(genres)
.sort((a,b)=>b[1]-a[1]);

let dominant=sorted[0]?.[0]||"Unknown";

/* personality mapping */

const personalities={

Action:"Adrenaline Seeker",
Romance:"Emotional Story Lover",
Comedy:"Light-hearted Explorer",
SciFi:"Futuristic Thinker",
Fantasy:"World Builder",
Horror:"Dark Narrative Fan",
Drama:"Deep Story Analyst",
Mystery:"Puzzle Solver",
Adventure:"Journey Enthusiast"

};

return personalities[dominant]||"Balanced Viewer";

}


/* =================================================
NEURAL STABILITY SCORE
================================================= */

function calculateStability(){

if(vaultData.length<2) return 100;

let total=0;

vaultData.forEach(v=>{
total+=v.similarity||0;
});

let avg=total/vaultData.length;

/* convert to percentage */

return Math.round(avg*100);

}


/* =================================================
CONFIDENCE HEATMAP DATA
================================================= */

function buildConfidenceHeatmap(){

let buckets={
low:0,
mid:0,
high:0
};

vaultData.forEach(v=>{

let sim=v.similarity||0;

if(sim<0.85) buckets.low++;

else if(sim<0.93) buckets.mid++;

else buckets.high++;

});

return buckets;

}

function populateGenreFilter(){

/* =================================================
APPLY FILTERS
================================================= */

function applyVaultFilters(){

let query=document
.getElementById("vaultSearch")
.value
.toLowerCase();

let genre=document
.getElementById("genreFilter")
.value;

let source=document
.getElementById("sourceFilter")
.value;

let confidence=document
.getElementById("confidenceFilter")
.value;

let sort=document
.getElementById("sortFilter")
.value;

let filtered=[...vaultData];


/* text search */

if(query){

filtered=filtered.filter(v=>
v.title.toLowerCase().includes(query)
);

}


/* genre filter */

if(genre){

filtered=filtered.filter(v=>
v.genres.includes(genre)
);

}


/* source filter */

if(source){

filtered=filtered.filter(v=>
v.source===source
);

}


/* confidence filter */

if(confidence){

filtered=filtered.filter(v=>{

let sim=v.similarity||1;

if(confidence==="high") return sim>0.93;

if(confidence==="mid") return sim>0.85 && sim<=0.93;

if(confidence==="low") return sim<=0.85;

});

}


/* sorting */

if(sort==="date"){

filtered.sort((a,b)=>b.scanDate-a.scanDate);

}

if(sort==="popularity"){

filtered.sort((a,b)=>b.popularity-a.popularity);

}

if(sort==="score"){

filtered.sort((a,b)=>b.score-a.score);

}

if(sort==="confidence"){

filtered.sort((a,b)=>b.similarity-a.similarity);

}


/* render */

renderFilteredVault(filtered);

}

/* =================================================
SCAN TIMELINE EVOLUTION
================================================= */

function viewTimeline(){

let sorted=[...vaultData]
.sort((a,b)=>a.scanDate-b.scanDate);

let dates=sorted.map(v=>
new Date(v.scanDate).toLocaleDateString()
);

let counts=[];

sorted.forEach((v,i)=>{
counts.push(i+1);
});

document.getElementById("mainContent").innerHTML=`

<h2>Scan Timeline</h2>

<canvas id="timelineChart"
style="margin-top:30px"></canvas>

`;

new Chart(
document.getElementById("timelineChart"),
{

type:"line",

data:{

labels:dates,

datasets:[{

label:"Vault Growth",

data:counts,

borderColor:"var(--accent)",

backgroundColor:"rgba(0,255,157,.15)",

fill:true,

tension:.35

}]

}

});

}

src="${v.cover}"
style="
width:100%;
height:180px;
object-fit:cover;
border-radius:20px
">

}

/* =================================================
CONFIDENCE HEATMAP OVERLAY IN VAULT
================================================= */

function applyVaultHeatmap(){

const cards=document.querySelectorAll(".glass-card");

cards.forEach((card,i)=>{

let v=vaultData[i];

if(!v) return;

let sim=v.similarity||1;

let color="#00ff9d";

if(sim<0.93) color="#ffc400";
if(sim<0.85) color="#ff3b3b";

card.style.boxShadow=`0 0 18px ${color}`;

});

}

/* ================= INSTALL PROMPT ================= */

let deferredPrompt;

window.addEventListener("beforeinstallprompt", e => {

  e.preventDefault();

  deferredPrompt = e;

  showInstallButton();

});

function showInstallButton(){

  const btn = document.createElement("button");

  btn.textContent = "Install AETHER";

  btn.style.position = "fixed";
  btn.style.bottom = "20px";
  btn.style.right = "20px";

  btn.onclick = () => {

    deferredPrompt.prompt();

    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
    });

  };

  document.body.appendChild(btn);

}
